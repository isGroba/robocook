spring.application.name=robocook

# JDBC
spring.datasource.url=jdbc:mysql://localhost:3306/robocook
spring.datasource.username=robocook
spring.datasource.password=robocook

# GENERAL LOG
spring.main.banner-mode=OFF
# Reduce logging level. Set logging level to warn
logging.level.root=warn

# LOG JDBC
logging.level.org.springframework.jdbc.core=trace
# logea as setencias SQL
logging.level.org.hibernate.SQL=trace
# registra os valores que se utilizan
logging.level.org.hibernate.orm.jdbc.bind=trace

# SWAGGER
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# Personalización de Swagger UI
# /api-docs endpoint custom path
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.persist-authorization=true

# CUSTOM ENDPOINT
# Packages to include
# springdoc.packagesToScan=com.package1, com.package2

# Paths to include
#springdoc.pathsToMatch=/labels/**, /recipes/**

# Show only endpoints documentated
# springdoc.swagger-ui.show-extensions=true
# springdoc.use-fqn=true